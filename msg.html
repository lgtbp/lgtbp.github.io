<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>留言</title>
    <script src="libs/jquery/jquery.min.js"></script>
    <style type="text/css">
        /* fallback */
        @font-face {
            font-family: 'Material Icons';
            font-style: normal;
            font-weight: 400;
            src: url(https://fonts.gstatic.com/s/materialicons/v109/flUhRq6tzZclQEJ-Vdg-IuiaDsNc.woff2) format('woff2');
        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }

        * {
            font-family: "Roboto Slab", serif;
            font-weight: 300;
            outline: none;
            user-select: none;
            -moz-user-select: none;
            -khtml-user-select: none;
            -webkit-user-select: none;
            -o-user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .flex {
            display: flex;
        }

        .flex.column {
            flex-direction: column;
        }

        .flex.row {
            flex-direction: row;
        }

        .contentainer>.coursainer {
            width: 100%;
            margin: 20px 0%;
            display: flex;
            flex-direction: column;
        }

        .contentainer>.coursainer>div:nth-child(2) {
            width: 90%;
            margin: 0% 5%;
            display: flex;
            flex-direction: row;
        }

        .contentainer>.coursainer>div:nth-child(2)>p {
            flex: 1;
            padding-left: 20px;
            border-left: 2px solid #C5CAE9;
            text-transform: uppercase;
            font-size: 24px;
            font-weight: 400;
        }

        .contentainer>.coursainer>div:nth-child(2)>label {
            width: auto;
            height: 32px;
            padding: 5px 5px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            align-self: center;
            color: #727272;
            transition: color 200ms ease-in-out;
        }

        .contentainer>.coursainer>div:nth-child(2)>label>i {
            font-size: 32px;
        }

        .contentainer>.coursainer>div:nth-child(2)>label:hover {
            color: #3f51b5;
        }

        .courses-list {
            list-style: none;
            flex: 1;
            padding: 0;
            margin: 10px 0px;
            list-style: none;
            display: flex;
            flex-flow: row wrap;
            justify-content: center;
        }

        .courses-item {
            min-width: 140px;
            min-height: calc((14px * 2) + 14px + 16px + 12px);
            padding: 14px;
            margin: 6px;
            background-color: #F6F6F6;
            box-shadow: 0px 0px 4px rgba(21, 21, 21, 0.21);
            border: 1px solid rgba(21, 21, 21, 0.12);
            display: flex;
            flex-direction: column;
            align-content: space-between;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
        }

        .courses-item:hover {
            box-shadow: 0px 0px 4px rgba(21, 21, 21, 0.21);
        }

        .courses-item>span {
            font-size: 16px;
        }

        .courses-item>span:nth-last-child(2n+1) {
            font-size: 12px;
            margin-top: 4px;
            text-align: right;
        }

        .course-item-checkbox {
            display: none;
        }

        .course-item-checkbox:checked+.courses-item::after {
            content: "check";
            width: auto;
            height: auto;
            padding: 5px;
            font-size: 16px;
            font-family: 'Material Icons';
            background-color: rgba(63, 81, 181, 0.63);
            color: #FFFFFF;
            position: absolute;
            top: 5px;
            right: 5px;
        }

        .add-form {
            width: 90%;
            height: auto;
            max-height: 0px;
            margin: 20px 0%;
            padding: 0px 5%;
            margin-top: 6px;
            background-color: #303F9F;
            box-shadow: inset 0px -4px 4px -2px rgba(21, 21, 21, 0.21), inset 0px 4px 4px -2px rgba(21, 21, 21, 0.21);
            transition: max-height 200ms ease-in-out;
            overflow: hidden;
        }

        .add-form>input {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-bottom: 1px solid #F6F6F6;
            background-color: transparent;
            color: #F6F6F6;
        }

        .add-form>input:first-child {
            margin-top: 30px;
        }

        .add-form>button {
            margin: 10px;
            padding: 10px;
            font-size: 17px;
            background-color: #F6F6F6;
            border: none;
            border-radius: 2px;
            box-shadow: 0px 0px 4px rgba(21, 21, 21, 0.21);
            text-transform: uppercase;
            cursor: pointer;
        }

        .add-form>button:last-child {
            margin-bottom: 30px;
        }

        #add-form-checkbox:checked~.add-form {
            max-height: 400px;
        }

        #add-form-checkbox:checked~div:nth-child(2)>label:last-child {
            color: #3F51B5;
        }
    </style>
</head>

<body>
    <article class="contentainer flex column">
        <div class="coursainer flex column">
            <input type="checkbox" id="add-form-checkbox" style="display: none;">
            <div>
                <p>留言板</p>
                <label for="add-form-checkbox"><i class="material-icons">add</i>
                </label>
            </div>
            <section class="add-form flex column">
                <input type="text" id="ugh-text" placeholder="留言">
                <input type="text" id="ugh-date" placeholder="名字">
                <button onclick="add();">Ugh Add</button>
            </section>
            <div class="courses-list" id="courses-list"></div>
        </div>
    </article>
    <script>
        var jdata;
        var check_num = 0
        var inputs = [];
        var labels = [];
        function checked_event(i) {
            if (check_num == i) {
                document.getElementById("course-item-" + (check_num)).checked = false;
                check_num = 0;
            } else
                check_num = i;
            //console.log("check_num:" + check_num)
        }

        function create(i) {
            inputs.push(document.createElement("INPUT"));
            inputs[inputs.length - 1].type = "radio";
            inputs[inputs.length - 1].className = "course-item-checkbox";
            inputs[inputs.length - 1].id = "course-item-" + i;
            inputs[inputs.length - 1].name = "course-ridio";
            inputs[inputs.length - 1].setAttribute("onclick", "checked_event(" + i + ")");

            labels.push(document.createElement("LABEL"));
            labels[labels.length - 1].htmlFor = "course-item-" + i;
            labels[labels.length - 1].className = "courses-item flex column";
            labels[labels.length - 1].id = "courses-item-" + i;

            var msgoo = jdata.msg[i - 1];
            //console.log(msgoo)
            var omsg = msgoo.split("@#");
            for (var inum = 0; inum < omsg.length; inum++) {
                var oomas = omsg[inum].split("@$")

                spann = document.createElement("SPAN");
                spann.appendChild(document.createTextNode(oomas[0]));
                spannn = document.createElement("SPAN");
                spannn.appendChild(document.createTextNode(oomas[1]));
                labels[labels.length - 1].appendChild(spann);
                labels[labels.length - 1].appendChild(spannn);
            }
        }
        function clear() {
            document.getElementById("courses-list").innerHTML = "";
        }
        function draw() {
            for (var i = 0; i < jdata.num; i++) {
                document.getElementById("courses-list").appendChild(inputs[i]);
                document.getElementById("courses-list").appendChild(labels[i]);
            }
        }
        function load() {
            inputs = [];
            labels = [];
            for (var i = 0; i < jdata.num; i++) {
                create((i + 1));
            }
            clear();
            draw();
            check_num = 0;
        }
        function getFormatDate() {
            var nowDate = new Date();
            var month = nowDate.getMonth() + 1 < 10 ? "0" + (nowDate.getMonth() + 1) : nowDate.getMonth() + 1;
            var date = nowDate.getDate() < 10 ? "0" + nowDate.getDate() : nowDate.getDate();
            return month + "-" + date;
        }

        function add() {
            var updata = document.getElementById("ugh-text").value + "@$" + document.getElementById("ugh-date").value + getFormatDate()
            var uid = jdata.num
            if (check_num)
                uid = jdata.id[check_num - 1]

            //console.log("id:" + uid)
            $.ajax({
                url: "https://47.107.74.49:8060/msgset.api", // 获取自己系统后台用户信息接口
                type: "POST",
                data: { "uid": uid, "data": updata },
                dataType: "json",
                success: function (data) {
                    if (data.code == 200) {//新id
                        // console.log("new id:" + data.msg)
                        jdata.uid = data.msg
                    } else if (data.code == 0) {
                        alert("带有禁止字符");
                        return
                    }
                    if (check_num) { //旧数据
                        jdata.msg[check_num - 1] += "@#" + updata
                    }
                    else {
                        jdata.id[jdata.num] = jdata.uid - 1
                        jdata.msg[jdata.num] = updata
                        jdata.num++
                    }
                    document.getElementById("ugh-text").value = "";
                    document.getElementById("ugh-date").value = "";
                    load();
                },
                error: function (data) {
                    alert("上传失败");
                }
            });
        }
        window.onload = function () {
            Logout_btn()
        }
        function Logout_btn() {
            $.ajax({
                url: "https://47.107.74.49:8060/msgget.api", // 获取自己系统后台用户信息接口
                type: "POST",
                dataType: "json",
                success: function (data) {
                    jdata = data
                    load();
                },
                error: function (data) {
                    alert("连接服务器失败");
                }
            });
        }
    </script>
</body>

</html>
