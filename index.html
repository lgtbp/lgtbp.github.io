<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Home</title>
	<meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link href="libs/h5plus/css/mui.min.css" rel="stylesheet" />
	<style type="text/css">
		img {
			width: 165px;
			height: 165px;
			margin: 1px 1px;
		}


		.mui-preview-image.mui-fullscreen {
			position: fixed;
			z-index: 20;
			background-color: #000;
		}

		.mui-preview-header,
		.mui-preview-footer {
			position: absolute;
			width: 100%;
			left: 0;
			z-index: 10;
		}

		.mui-preview-header {
			height: 44px;
			top: 0;
		}

		.mui-preview-footer {
			height: 50px;
			bottom: 0px;
		}

		.mui-preview-header .mui-preview-indicator {
			display: block;
			line-height: 25px;
			color: #fff;
			text-align: center;
			margin: 15px auto 4;
			width: 70px;
			background-color: rgba(0, 0, 0, 0.4);
			border-radius: 12px;
			font-size: 16px;
		}

		.mui-preview-image {
			display: none;
			-webkit-animation-duration: 0.5s;
			animation-duration: 0.5s;
			-webkit-animation-fill-mode: both;
			animation-fill-mode: both;
		}

		.mui-preview-image.mui-preview-in {
			-webkit-animation-name: fadeIn;
			animation-name: fadeIn;
		}

		.mui-preview-image.mui-preview-out {
			background: none;
			-webkit-animation-name: fadeOut;
			animation-name: fadeOut;
		}

		.mui-preview-image.mui-preview-out .mui-preview-header,
		.mui-preview-image.mui-preview-out .mui-preview-footer {
			display: none;
		}

		.mui-zoom-scroller {
			position: absolute;
			display: -webkit-box;
			display: -webkit-flex;
			display: flex;
			-webkit-box-align: center;
			-webkit-align-items: center;
			align-items: center;
			-webkit-box-pack: center;
			-webkit-justify-content: center;
			justify-content: center;
			left: 0;
			right: 0;
			bottom: 0;
			top: 0;
			width: 100%;
			height: 100%;
			margin: 0;
			-webkit-backface-visibility: hidden;
		}

		.mui-zoom {
			-webkit-transform-style: preserve-3d;
			transform-style: preserve-3d;
		}

		.mui-slider .mui-slider-group .mui-slider-item img {
			width: auto;
			height: auto;
			max-width: 100%;
			max-height: 100%;
		}

		.mui-android-4-1 .mui-slider .mui-slider-group .mui-slider-item img {
			width: 100%;
		}

		.mui-android-4-1 .mui-slider.mui-preview-image .mui-slider-group .mui-slider-item {
			display: inline-table;
		}

		.mui-android-4-1 .mui-slider.mui-preview-image .mui-zoom-scroller img {
			display: table-cell;
			vertical-align: middle;
		}

		.mui-preview-loading {
			position: absolute;
			width: 100%;
			height: 100%;
			top: 0;
			left: 0;
			display: none;
		}

		.mui-preview-loading.mui-active {
			display: block;
		}

		.mui-preview-loading .mui-spinner-white {
			position: absolute;
			top: 50%;
			left: 50%;
			margin-left: -25px;
			margin-top: -25px;
			height: 50px;
			width: 50px;
		}

		.mui-preview-image img.mui-transitioning {
			-webkit-transition: -webkit-transform 0.5s ease, opacity 0.5s ease;
			transition: transform 0.5s ease, opacity 0.5s ease;
		}

		@-webkit-keyframes fadeIn {
			0% {
				opacity: 0;
			}

			100% {
				opacity: 1;
			}
		}

		@keyframes fadeIn {
			0% {
				opacity: 0;
			}

			100% {
				opacity: 1;
			}
		}

		@-webkit-keyframes fadeOut {
			0% {
				opacity: 1;
			}

			100% {
				opacity: 0;
			}
		}

		@keyframes fadeOut {
			0% {
				opacity: 1;
			}

			100% {
				opacity: 0;
			}
		}

		p img {
			max-width: 100%;
			height: auto;
		}
	</style>
</head>

<body>
	<div id="offCanvasWrapper" class="mui-off-canvas-wrap mui-draggable">
		<aside id="offCanvasSide" class="mui-off-canvas-left" style="width: 100px;">
			<div id="offCanvasSideScroll" class="mui-scroll-wrapper">
				<div class="mui-scroll">
					<div class="title">侧滑导航</div>
					<div class="mui-content-padded">
						<button type="button" class="mui-btn mui-btn-primary mui-btn-outlined"
							onclick="root_manage_btn()" class="mui-btn mui-btn-link mui-pull-right">
							管理
						</button>
					</div>
					<div class="mui-content-padded">
						<button type="button" class="mui-btn mui-btn-primary mui-btn-outlined" onclick="Logout_btn()"
							class="mui-btn mui-btn-link mui-pull-right">
							退出
						</button>
					</div>
				</div>
			</div>
		</aside>
		<div class="mui-inner-wrap">
			<header class="mui-bar mui-bar-nav" style="height: 45px;">
				<a href="#offCanvasSide" class="mui-icon mui-action-menu mui-icon-bars mui-pull-left"
					style="width: 65px;"></a>

				<button type="button" class="mui-btn mui-btn-primary mui-btn-outlined"
					style="width: 55px;font-size: 14px;" onclick='window.location.href ="./today.html"'>
					+
				</button>

				<button style="margin: 2px 2px;height: 43px;" class="mui-icon mui-btn-primary mui-icon-upload"
					id="promptBtn"></button>

				<input type="image" src="libs/picture/ico.jpg" style="height: 43px;float:right;" onclick="myico_btn()">
			</header>
			<div id="offCanvasContentScroll" class="mui-content mui-scroll-wrapper">

				<ul id="OA_task_2" class="mui-table-view mui-table-view-striped mui-table-view-condensed">
					<div id="mytl" class="mui-table-view mui-table-view-chevron"> </div>

					<button type="button" class="mui-btn mui-btn-primary " onclick="go_btn()">前一天</button>
					<button type="button" class="mui-btn mui-btn-primary " onclick="back_btn()">后一天</button>

				</ul>
			</div>
			<div class="mui-off-canvas-backdrop"></div>
		</div>

	</div>

	<script src="libs/h5plus/js/mui.min.js"></script>
	<script src="libs/jquery/jquery.min.js"></script>
	<script src="libs/js/mui.zoom.js"></script>
	<script src="libs/js/mui.previewimage.js"></script>

	<script src="libs/jquery/jquery.lazyload.min.js"></script>

	<script>
		var dayoff = 0
		mui.init({
			swipeBack: true //启用右滑关闭功能
		});
		mui.previewImage();
		//主界面和侧滑菜单界面均支持区域滚动；
		mui('#offCanvasSideScroll').scroll();
		mui('#offCanvasContentScroll').scroll();
		//实现ios平台原生侧滑关闭页面；
		if (mui.os.plus && mui.os.ios) {
			mui.plusReady(function () { //5+ iOS暂时无法屏蔽popGesture时传递touch事件，故该demo直接屏蔽popGesture功能
				plus.webview.currentWebview().setStyle({
					'popGesture': 'none'
				});
			});
		}
		function copyToClipboard(s) {
			if (window.clipboardData) {
				window.clipboardData.setData('text', s);
			} else {
				(function (s) {
					document.oncopy = function (e) {
						e.clipboardData.setData('text', s);
						e.preventDefault();
						document.oncopy = null;
					}
				})(s);
				document.execCommand('Copy');
			}
		}
		function shareTLdata(offest) {
			$.ajax({
				url: "https://47.107.74.49:8080/shareset.api", // 获取自己系统后台用户信息接口
				data: {
					"datetime": getFormatDate(0),
					"days": offest
				},
				type: "POST",
				dataType: "json",
				success: function (data) {
					if (data) {
						copyToClipboard("https://192.168.1.103:8080/" + data.msg)
						mui.toast('分享链接已复制到粘贴板上');
					}
				},
				error: function (data) {
					mui.toast("分享失败");
				}
			});
		}
		document.getElementById("promptBtn").addEventListener('tap', function (e) {
			e.detail.gesture.preventDefault(); //修复iOS 8.x平台存在的bug，使用plus.nativeUI.prompt会造成输入法闪一下又没了
			var btnArray = ['取消', '确定'];
			mui.prompt('分享今天Timeline：', '分享天数', '分享', btnArray, function (e) {
				if (e.index == 1) {
					if (e.value == "") {
						mui.alert('没有输入分享天数', '错误', function () {
						});
					}
					else {
						shareTLdata(e.value)

					}
				} else {
					mui.toast('取消分享');
				}
			})
		});
		function myico_btn() {
			//window.location.href = "./manage.html";
		}

		//获取当前时间
		function getFormatDate(offest) {
			var nowDate = new Date();
			nowDate.setTime(nowDate.getTime() + offest * 24 * 60 * 60 * 1000);
			var year = nowDate.getFullYear();
			var month = nowDate.getMonth() + 1 < 10 ? "0" + (nowDate.getMonth() + 1) : nowDate.getMonth() + 1;
			var date = nowDate.getDate() < 10 ? "0" + nowDate.getDate() : nowDate.getDate();
			console.log("time:" + year + month + date)
			return "" + year + month + date;
		}

		function getTLdata(offest) {
			dayoff += offest
			url_str = "https://47.107.74.49:8080/timeline.api?id=" + getFormatDate(dayoff)
			console.log("rul:" + url_str)
			$.ajax({
				url: url_str, // 获取自己系统后台用户信息接口
				data: {},
				type: "POST",
				dataType: "json",
				success: function (data) {
					if (data) {
						console.log(getFormatDate(dayoff) + ",data num:" + data.num)
						var html_str = "";
						if (data.num == 0) {
							mui.toast("没数据");
							return
						}
						for (let index = data.num - 1; index > -1; index--) {
							html_str +=

								"<li class=\"mui-table-view-cell mui-media\">\
                  					<div class=\"mui-slider-right mui-disabled\">\
						        		<button class=\"mui-btn mui-btn-grey mui-icon mui-icon-trash\" onclick=\"move_btn(0," + index + ")\"   >删除</button>\
						        		<button class=\"mui-btn mui-btn-yellow mui-icon mui-icon-upload\" onclick=\"move_btn(1," + index + ")\"  >分享</button>\
					  	      			<button class=\"mui-btn mui-btn-red mui-icon mui-icon-settings\" onclick=\"move_btn(2," + index + ")\"  >设置</button>\
				        			</div>\
										<div class=\"mui-table mui-slider-handle\">\
										<div class=\"mui-table-cell mui-col-xs-10\">\
											<div ><h2>" + data.tlRet[index].title + "</h2>" + "<p>" + data.tlRet[index].tltime + "</p> </div>"
								+ data.tlRet[index].tldata +
								"</div>\
									</div>\
								</li>"
						}
						document.getElementById("mytl").innerHTML = html_str;
						//document.getElementById("mytl").appendChild(html_str);
						mui.toast("更新数据");
						$("img").lazyload({ threshold: 10 });//在图片距离屏幕100px时提前载入：
					}
				},
				error: function (data) {
					mui.toast("退出失败:" + data.msg);
				}
			});
		}

		(function ($) {
			var btnArray = ['确认', '取消'];
			//第二个demo，向左拖拽后显示操作图标，释放后自动触发的业务逻辑
			$('#OA_task_2').on('slideleft', '.mui-table-view-cell', function (event) {
				var elem = this;
				// mui.confirm('确认删除该条记录？', 'Hello MUI', btnArray, function (e) {
				//   if (e.index == 0) {
				//     elem.parentNode.removeChild(elem);
				//   } else {
				//     setTimeout(function () {
				//       $.swipeoutClose(elem);
				//     }, 0);
				//   }
				// });
			});

		})(mui);

		window.onload = function () {
			console.log("init")
			dayoff = 0
			getTLdata(0)
		}

		function move_btn(x, y) {
			console.log("x,y:" + x + "," + y)
		}



		function go_btn() {
			getTLdata(-1)
		}

		function back_btn() {
			getTLdata(1)
		}

		function root_manage_btn() {
			window.location.href = "./root_manage.html";
		}

		function Logout_btn() {
			$.ajax({
				url: "https://47.107.74.49:8080/logout.api", // 获取自己系统后台用户信息接口
				data: {
					"logout": "ok"
				},
				type: "POST",
				dataType: "json",
				success: function (data) {
					if (data) {
						if (data.code == 200) { //判断返回值，这里根据的业务内容可做调整
							setTimeout(function () { //做延时以便显示登录状态值
								mui.toast("正在退出中...");
								window.location.href = "./login.html"; //指向登录的页面地址
							}, 100)
						} else {
							mui.toast("退出失败:" + data.msg); //显示登录失败的原因
							return false;
						}
					}
				},
				error: function (data) {
					mui.toast("退出失败:" + data.msg);
				}
			});
		}
	</script>
</body>

</html>
